services:
  - type: web
    name: suba-backend
    env: python
    rootDir: backend/suba
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: "https://suba-rho.vercel.app,http://localhost:3000,http://localhost:5500"
      - key: DATABASE_URL
        sync: false
      - key: APP_SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
