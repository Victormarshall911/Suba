# SUBA Backend — Alembic Configuration
# ========================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Set to 'true' to run each migration in its own transaction
transaction_per_migration = true

# Timezone to use when rendering the date within the migration file
timezone = UTC

# The database URL — overridden at runtime by env.py from app.config
# This is a placeholder that is never used directly.
sqlalchemy.url = postgresql+asyncpg://user:password@host:5432/suba_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
